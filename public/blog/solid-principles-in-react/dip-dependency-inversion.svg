<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Dependency Inversion Principle: módulo de alto nível e implementações de baixo nível dependendo de uma abstração comum</title>
  <defs>
    <pattern id="grid-d" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#cbd5e1" opacity="0.5"/>
    </pattern>
    <marker id="arrow-d" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#f8fafc"/>
  <rect width="800" height="450" fill="url(#grid-d)"/>

  <!-- high-level module -->
  <rect x="300" y="55" width="200" height="60" rx="10" fill="#0f172a"/>

  <!-- abstraction -->
  <polygon points="400,150 470,210 400,270 330,210" fill="#e0f7fb" stroke="#0891b2" stroke-width="3" stroke-dasharray="7,6"/>

  <!-- low-level implementations -->
  <rect x="100" y="330" width="150" height="60" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="325" y="330" width="150" height="60" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2.5"/>
  <rect x="550" y="330" width="150" height="60" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="2.5"/>

  <!-- arrows into abstraction -->
  <path d="M400,115 L400,148" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow-d)"/>
  <path d="M175,330 L355,225" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow-d)"/>
  <path d="M400,330 L400,272" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow-d)"/>
  <path d="M625,330 L445,225" stroke="#6366f1" stroke-width="2.5" marker-end="url(#arrow-d)"/>

  <circle cx="60" cy="60" r="26" fill="#0f172a"/>
  <text x="60" y="69" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="24" fill="#ffffff">D</text>
</svg>
