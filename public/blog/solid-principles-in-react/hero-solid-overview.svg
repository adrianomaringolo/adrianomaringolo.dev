<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>SOLID no React — cinco pilares sustentando uma mesma viga</title>
  <defs>
    <pattern id="grid-hero" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.3" fill="#cbd5e1" opacity="0.6"/>
    </pattern>
    <radialGradient id="glow-hero" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect width="1200" height="630" fill="url(#grid-hero)"/>
  <rect width="1200" height="630" fill="url(#glow-hero)"/>

  <!-- react atom mark above the beam -->
  <g transform="translate(600,92)" stroke="#0891b2" stroke-width="2.5" fill="none">
    <ellipse rx="42" ry="16"/>
    <ellipse rx="42" ry="16" transform="rotate(60)"/>
    <ellipse rx="42" ry="16" transform="rotate(120)"/>
    <circle r="5.5" fill="#0891b2" stroke="none"/>
  </g>

  <!-- lintel beam -->
  <rect x="270" y="146" width="660" height="18" rx="5" fill="#0f172a"/>

  <!-- columns -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="28" fill="#ffffff" text-anchor="middle">
    <g>
      <rect x="309" y="185" width="70" height="215" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2.5"/>
      <circle cx="344" cy="172" r="32" fill="#0f172a"/>
      <text x="344" y="182">S</text>
    </g>
    <g>
      <rect x="437" y="185" width="70" height="215" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2.5"/>
      <circle cx="472" cy="172" r="32" fill="#0f172a"/>
      <text x="472" y="182">O</text>
    </g>
    <g>
      <rect x="565" y="185" width="70" height="215" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2.5"/>
      <circle cx="600" cy="172" r="32" fill="#0f172a"/>
      <text x="600" y="182">L</text>
    </g>
    <g>
      <rect x="693" y="185" width="70" height="215" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2.5"/>
      <circle cx="728" cy="172" r="32" fill="#0f172a"/>
      <text x="728" y="182">I</text>
    </g>
    <g>
      <rect x="821" y="185" width="70" height="215" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2.5"/>
      <circle cx="856" cy="172" r="32" fill="#0f172a"/>
      <text x="856" y="182">D</text>
    </g>
  </g>

  <!-- baseline -->
  <rect x="258" y="400" width="684" height="8" rx="4" fill="#0891b2"/>

  <!-- wordmark -->
  <text x="600" y="490" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="800" font-size="72" letter-spacing="-2" fill="#0f172a">SOLID</text>
  <text x="600" y="530" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="600" font-size="28" letter-spacing="6" fill="#0891b2">REACT</text>

  <!-- footer -->
  <text x="600" y="588" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="500" font-size="18" letter-spacing="1" fill="#94a3b8">adrianomaringolo.dev</text>
</svg>
