<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Open/Closed Principle: núcleo estável recebendo extensões plugáveis sem ser modificado</title>
  <defs>
    <pattern id="grid-o" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#cbd5e1" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="#f8fafc"/>
  <rect width="800" height="450" fill="url(#grid-o)"/>

  <!-- closed core -->
  <rect x="220" y="150" width="180" height="150" rx="14" fill="#0f172a"/>
  <g transform="translate(310,225)" stroke="#f8fafc" stroke-width="3" fill="none">
    <rect x="-16" y="-4" width="32" height="26" rx="3"/>
    <path d="M-10,-4 L-10,-16 A10,10 0 0 1 10,-16 L10,-4"/>
  </g>

  <!-- connectors + extensions -->
  <g stroke="#0891b2" stroke-width="3">
    <line x1="400" y1="180" x2="470" y2="150"/>
    <line x1="400" y1="225" x2="470" y2="225"/>
    <line x1="400" y1="270" x2="470" y2="300"/>
  </g>
  <circle cx="400" cy="180" r="5" fill="#0891b2"/>
  <circle cx="400" cy="225" r="5" fill="#0891b2"/>
  <circle cx="400" cy="270" r="5" fill="#0891b2"/>

  <g fill="none" stroke="#0891b2" stroke-width="2.5" stroke-dasharray="7,6">
    <rect x="470" y="120" width="110" height="60" rx="10"/>
    <rect x="470" y="195" width="110" height="60" rx="10"/>
    <rect x="470" y="270" width="110" height="60" rx="10"/>
  </g>
  <g stroke="#0891b2" stroke-width="2.5">
    <path d="M513,150 h24 M525,138 v24"/>
    <path d="M513,225 h24 M525,213 v24"/>
    <path d="M513,300 h24 M525,288 v24"/>
  </g>

  <circle cx="60" cy="60" r="26" fill="#0f172a"/>
  <text x="60" y="69" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="24" fill="#ffffff">O</text>
</svg>
