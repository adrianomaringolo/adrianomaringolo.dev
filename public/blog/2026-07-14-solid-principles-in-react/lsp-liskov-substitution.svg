<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Liskov Substitution Principle: dois componentes de mesma forma encaixando no mesmo slot</title>
  <defs>
    <pattern id="grid-l" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#cbd5e1" opacity="0.5"/>
    </pattern>
    <marker id="arrow-l" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0f172a"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="#f8fafc"/>
  <rect width="800" height="450" fill="url(#grid-l)"/>

  <!-- shape A -->
  <rect x="115" y="175" width="150" height="100" rx="12" fill="#0891b2" fill-opacity="0.12" stroke="#0891b2" stroke-width="2.5"/>
  <text x="190" y="233" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="20" fill="#0891b2">A</text>

  <!-- slot -->
  <rect x="325" y="175" width="150" height="100" rx="12" fill="none" stroke="#0f172a" stroke-width="3" stroke-dasharray="7,6"/>

  <!-- shape B -->
  <rect x="535" y="175" width="150" height="100" rx="12" fill="#6366f1" fill-opacity="0.12" stroke="#6366f1" stroke-width="2.5"/>
  <text x="610" y="233" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="20" fill="#6366f1">B</text>

  <!-- arrows both fitting the same slot -->
  <path d="M270,225 L318,225" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow-l)"/>
  <path d="M530,225 L482,225" stroke="#0f172a" stroke-width="3" marker-end="url(#arrow-l)"/>

  <!-- equivalence mark -->
  <g transform="translate(400,320)" stroke="#64748b" stroke-width="2.5">
    <line x1="-16" y1="-5" x2="16" y2="-5"/>
    <line x1="-16" y1="5" x2="16" y2="5"/>
  </g>

  <circle cx="60" cy="60" r="26" fill="#0f172a"/>
  <text x="60" y="69" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="700" font-size="24" fill="#ffffff">L</text>
</svg>
