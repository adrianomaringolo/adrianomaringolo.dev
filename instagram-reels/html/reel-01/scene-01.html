<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f172a;
    font-family: 'Manrope', sans-serif;
  }

  .scene {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
  }

  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(248,250,252,0.06) 1.5px, transparent 1.5px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .bg-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 30%, rgba(97,218,251,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 70% 60% at 50% 80%, rgba(99,102,241,0.14) 0%, transparent 60%);
    pointer-events: none;
  }

  /* React official logo — spins around its center */
  .react-logo-wrap {
    width: 220px;
    height: 200px;
    margin-bottom: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0s;
    /* outer glow */
    filter: drop-shadow(0 0 18px rgba(97,218,251,0.55)) drop-shadow(0 0 40px rgba(97,218,251,0.25));
  }

  .react-logo-wrap svg {
    width: 220px;
    height: 200px;
    animation: reactSpin 6s linear infinite;
  }

  .eyebrow {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #06b6d4;
    margin-bottom: 40px;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.15s;
  }

  h1 {
    font-size: 100px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.0;
    text-align: center;
    color: #f8fafc;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.25s;
  }

  .erros-word {
    color: #ef4444;
    text-shadow:
      0 0 30px rgba(239,68,68,0.8),
      0 0 60px rgba(239,68,68,0.4);
    animation: errGlow 2.4s ease-in-out infinite;
    animation-delay: 1s;
  }

  .topic {
    margin-top: 52px;
    font-size: 50px;
    font-weight: 800;
    letter-spacing: -0.02em;
    text-align: center;
    color: #f8fafc;
    line-height: 1.2;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.4s;
  }
  .topic em {
    font-style: normal;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    margin-top: 40px;
    font-size: 32px;
    font-weight: 500;
    color: #64748b;
    text-align: center;
    animation: fadeIn 0.5s ease both;
    animation-delay: 0.55s;
  }

  /* Warning badges */
  .badges {
    display: flex;
    gap: 20px;
    margin-top: 72px;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.65s;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: 100px;
    padding: 14px 28px;
    font-size: 26px;
    font-weight: 700;
    color: #f87171;
    animation: badgePulse 2.8s ease-in-out infinite;
  }
  .badge:nth-child(2) { animation-delay: 0.4s; }
  .badge:nth-child(3) { animation-delay: 0.8s; }

  .handle {
    position: absolute;
    bottom: 64px;
    right: 72px;
    font-size: 24px;
    font-weight: 600;
    color: #94a3b8;
    animation: fadeIn 0.5s ease both;
    animation-delay: 0.8s;
  }
  .handle em { font-style: normal; color: #06b6d4; }

  @keyframes reactSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes errGlow {
    0%, 100% { text-shadow: 0 0 30px rgba(239,68,68,0.8), 0 0 60px rgba(239,68,68,0.4); }
    50%       { text-shadow: 0 0 50px rgba(239,68,68,1.0), 0 0 90px rgba(239,68,68,0.6); }
  }
  @keyframes badgePulse {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.03); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body data-duration="6">
<div class="scene">
  <div class="bg-glow"></div>
  <div class="bg-dots"></div>

  <!-- React official logo (inline SVG, spins via CSS) -->
  <div class="react-logo-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="-11.5 -10.23174 23 20.46348">
      <circle cx="0" cy="0" r="2.05" fill="#61dafb"/>
      <g stroke="#61dafb" stroke-width="1" fill="none">
        <ellipse rx="11" ry="4.2"/>
        <ellipse rx="11" ry="4.2" transform="rotate(60)"/>
        <ellipse rx="11" ry="4.2" transform="rotate(120)"/>
      </g>
    </svg>
  </div>

  <p class="eyebrow">React Hooks</p>
  <h1>3 <span class="erros-word">ERROS</span><br>COMUNS</h1>
  <div class="topic">ao usar <em>useEffect</em></div>
  <p class="sub">que causam bugs em produção</p>

  <div class="badges">
    <div class="badge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      bug
    </div>
    <div class="badge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      loop
    </div>
    <div class="badge">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22a7 7 0 007-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 007 7z"/>
      </svg>
      leak
    </div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
