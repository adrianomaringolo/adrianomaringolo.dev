<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f172a;
  }

  .strips {
    display: flex;
    width: 1080px;
    height: 1920px;
  }

  .strip {
    flex: 1;
    height: 100%;
    transform: translateY(100%);
    animation:
      stripIn  0.4s cubic-bezier(0.4, 0, 0.2, 1) both,
      stripOut 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
  }

  .strip:nth-child(1) { background: #06b6d4; animation-delay: 0.00s, 0.45s; }
  .strip:nth-child(2) { background: #6366f1; animation-delay: 0.05s, 0.50s; }
  .strip:nth-child(3) { background: #0891b2; animation-delay: 0.10s, 0.55s; }
  .strip:nth-child(4) { background: #818cf8; animation-delay: 0.15s, 0.60s; }
  .strip:nth-child(5) { background: #06b6d4; animation-delay: 0.20s, 0.65s; }

  @keyframes stripIn {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes stripOut {
    from { transform: translateY(0); }
    to   { transform: translateY(-100%); }
  }
</style>
</head>
<body data-duration="1.05">
<div class="strips">
  <div class="strip"></div>
  <div class="strip"></div>
  <div class="strip"></div>
  <div class="strip"></div>
  <div class="strip"></div>
</div>
</body>
</html>
