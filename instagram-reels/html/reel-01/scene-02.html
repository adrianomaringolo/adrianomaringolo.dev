<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f172a;
    font-family: 'Manrope', sans-serif;
  }

  .scene {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 80px 96px;
  }

  .blob-1 {
    position: absolute;
    top: -80px; left: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(251,191,36,0.10) 0%, transparent 60%);
    pointer-events: none;
  }
  .blob-2 {
    position: absolute;
    bottom: 80px; right: -150px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(239,68,68,0.10) 0%, transparent 60%);
    pointer-events: none;
  }
  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(248,250,252,0.06) 1.5px, transparent 1.5px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .accent-left {
    position: absolute;
    left: 0; top: 160px; bottom: 160px;
    width: 5px;
    background: linear-gradient(180deg, #fbbf24, #ef4444);
    border-radius: 0 3px 3px 0;
  }

  .step-badge {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: rgba(251,191,36,0.10);
    border: 1px solid rgba(251,191,36,0.30);
    border-radius: 100px;
    padding: 12px 28px;
    margin-bottom: 40px;
    animation: fadeUp 0.4s ease both;
    animation-delay: 0.05s;
  }
  .step-badge span {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fbbf24;
  }

  /* Animated warning icon */
  .warning-icon {
    animation: warnPulse 1.6s ease-in-out infinite;
    animation-delay: 0.8s;
    flex-shrink: 0;
  }

  h2 {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: #f8fafc;
    margin-bottom: 28px;
    animation: fadeUp 0.4s ease both;
    animation-delay: 0.15s;
  }
  h2 .danger { color: #fbbf24; }

  .description {
    font-size: 32px;
    font-weight: 500;
    color: #94a3b8;
    line-height: 1.55;
    margin-bottom: 48px;
    animation: fadeUp 0.4s ease both;
    animation-delay: 0.25s;
  }

  /* Code comparison: wrong → right */
  .code-compare {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.38s;
  }

  .code-block {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 18px;
    padding: 36px 44px;
    position: relative;
  }
  .code-block.wrong {
    border-color: rgba(239,68,68,0.35);
    background: rgba(239,68,68,0.05);
  }
  .code-block.right {
    border-color: rgba(34,197,94,0.35);
    background: rgba(34,197,94,0.04);
  }

  .code-label {
    position: absolute;
    top: -16px; right: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 700;
    padding: 4px 18px;
    border-radius: 100px;
  }
  .wrong .code-label { background: #ef4444; color: #fff; }
  .right .code-label { background: #22c55e; color: #fff; }

  pre {
    font-family: 'Manrope', monospace;
    font-size: 27px;
    font-weight: 600;
    line-height: 1.7;
    color: #f8fafc;
  }
  .kw  { color: #6366f1; }
  .fn  { color: #06b6d4; }
  .cm  { color: #64748b; font-weight: 500; }
  .str { color: #f59e0b; }

  /* Pulsing highlight on the empty array that's the bug */
  .err-dep {
    color: #ef4444;
    position: relative;
  }
  .err-dep::after {
    content: '';
    position: absolute;
    inset: -4px -6px;
    background: rgba(239,68,68,0.25);
    border-radius: 6px;
    animation: depPulse 1.8s ease-in-out infinite;
    animation-delay: 1.0s;
  }

  /* Correct dep */
  .ok-dep {
    color: #22c55e;
    position: relative;
  }
  .ok-dep::after {
    content: '';
    position: absolute;
    inset: -4px -6px;
    background: rgba(34,197,94,0.20);
    border-radius: 6px;
    animation: okPulse 2.0s ease-in-out infinite;
    animation-delay: 1.2s;
  }

  /* Animated arrow between wrong and right */
  .arrow-fix {
    align-self: center;
    animation: arrowBounce 1.2s ease-in-out infinite;
    animation-delay: 0.9s;
  }

  .handle {
    position: absolute;
    bottom: 64px; right: 72px;
    font-size: 24px;
    font-weight: 600;
    color: #94a3b8;
    animation: fadeIn 0.5s ease both;
    animation-delay: 0.6s;
  }
  .handle em { font-style: normal; color: #06b6d4; }

  @keyframes warnPulse {
    0%, 100% { transform: scale(1);    opacity: 0.85; }
    50%       { transform: scale(1.12); opacity: 1;    }
  }
  @keyframes depPulse {
    0%, 100% { opacity: 0; }
    50%       { opacity: 1; }
  }
  @keyframes okPulse {
    0%, 100% { opacity: 0; }
    50%       { opacity: 1; }
  }
  @keyframes arrowBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(8px); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body data-duration="8">
<div class="scene">
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>

  <div class="step-badge">
    <div class="warning-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <span>Erro 1 de 3</span>
  </div>

  <h2><span class="danger">Deps</span> incompletas<br>no array</h2>
  <p class="description">Esquecer uma dependência<br>causa dados desatualizados<br>e comportamento inesperado.</p>

  <div class="code-compare">
    <div class="code-block wrong">
      <div class="code-label">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Errado
      </div>
      <pre><span class="kw">useEffect</span>(() =&gt; {
  <span class="fn">fetchUser</span>(<span class="str">userId</span>);
}, <span class="err-dep">[]</span>); <span class="cm">// userId ignorado!</span></pre>
    </div>

    <div class="arrow-fix">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <polyline points="19 12 12 19 5 12"/>
      </svg>
    </div>

    <div class="code-block right">
      <div class="code-label">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Correto
      </div>
      <pre><span class="kw">useEffect</span>(() =&gt; {
  <span class="fn">fetchUser</span>(<span class="str">userId</span>);
}, <span class="ok-dep">[userId]</span>); <span class="cm">// incluido!</span></pre>
    </div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
