<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f172a;
    font-family: 'Manrope', sans-serif;
  }

  .scene {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 100px 90px 100px 110px;
  }

  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(248,250,252,0.05) 1.5px, transparent 1.5px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .blob-top {
    position: absolute;
    top: -80px;
    left: -80px;
    width: 560px;
    height: 560px;
    background: radial-gradient(circle, rgba(245,158,11,0.10) 0%, transparent 65%);
    pointer-events: none;
  }

  .blob-bot {
    position: absolute;
    bottom: -80px;
    right: -60px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 65%);
    pointer-events: none;
  }

  .accent-left {
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    background: linear-gradient(180deg, #f59e0b 0%, #6366f1 100%);
  }

  .ghost-num {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 580px;
    font-weight: 900;
    letter-spacing: -0.06em;
    color: rgba(245,158,11,0.04);
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(245,158,11,0.10);
    border: 1px solid rgba(245,158,11,0.28);
    border-radius: 100px;
    padding: 12px 28px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #f59e0b;
    margin-bottom: 52px;
    animation: fadeIn 0.35s ease both;
    animation-delay: 0.0s;
  }

  .icon-wrap {
    margin-bottom: 44px;
    color: #f59e0b;
    filter: drop-shadow(0 0 18px rgba(245,158,11,0.5));
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.15s;
  }

  .icon-wrap svg {
    animation: clockPulse 2.2s ease-in-out infinite;
    animation-delay: 1.0s;
  }

  h2 {
    font-size: 82px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.08;
    color: #f8fafc;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.3s;
  }

  h2 .accent {
    color: #f59e0b;
    text-shadow: 0 0 30px rgba(245,158,11,0.4);
  }

  .divider {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #f59e0b, transparent);
    border-radius: 2px;
    margin: 44px 0;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.5s;
  }

  .desc {
    font-size: 52px;
    font-weight: 500;
    line-height: 1.5;
    color: #94a3b8;
    max-width: 880px;
  }

  .dl { overflow: hidden; white-space: nowrap; }
  /* 0.35s por linha */
  .dl-1 { animation: typeReveal 0.35s steps(28, end) 1.10s both; }
  .dl-2 { animation: typeReveal 0.35s steps(26, end) 1.45s both; }
  .dl-3 { animation: typeReveal 0.35s steps(21, end) 1.80s both; }
  .dl-4 { animation: typeReveal 0.35s steps(19, end) 2.15s both; }
  .dl-5 { animation: typeReveal 0.35s steps(26, end) 2.50s both; }

  @keyframes typeReveal {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0%   0 0); }
  }

  .handle {
    position: absolute;
    bottom: 64px;
    right: 72px;
    font-size: 32px;
    font-weight: 600;
    color: #94a3b8;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.8s;
  }
  .handle em { font-style: normal; color: #06b6d4; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes clockPulse {
    0%, 100% { transform: scale(1);    opacity: 0.85; }
    50%       { transform: scale(1.08); opacity: 1.0; }
  }
</style>
</head>
<body data-duration="10">
<div class="scene">
  <div class="blob-top"></div>
  <div class="blob-bot"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>
  <div class="ghost-num">02</div>

  <div class="tag">Verdade 02</div>

  <div class="icon-wrap">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
  </div>

  <h2>Os salários são bons.<br><span class="accent">Validade curta.</span></h2>

  <div class="divider"></div>

  <div class="desc">
    <div class="dl dl-1">A stack que você domina hoje</div>
    <div class="dl dl-2">pode ser legado em 2 anos.</div>
    <div class="dl dl-3">Atualização constante</div>
    <div class="dl dl-4">não é diferencial —</div>
    <div class="dl dl-5">é o novo requisito mínimo.</div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
