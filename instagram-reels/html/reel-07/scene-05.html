<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f172a;
    font-family: 'Manrope', sans-serif;
  }

  .scene {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 80px;
    text-align: center;
  }

  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(248,250,252,0.055) 1.5px, transparent 1.5px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .blob-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 900px;
    background: radial-gradient(circle, rgba(6,182,212,0.09) 0%, transparent 60%);
    pointer-events: none;
  }

  .blob-bot {
    position: absolute;
    bottom: -100px;
    right: -80px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 65%);
    pointer-events: none;
  }

  .question {
    font-size: 72px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #64748b;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.0s;
  }

  .answer {
    font-size: 120px;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #06b6d4;
    line-height: 1.0;
    margin-top: 16px;
    text-shadow:
      0 0 50px rgba(6,182,212,0.6),
      0 0 100px rgba(6,182,212,0.25);
    animation: fadeUp 0.55s ease both, cyanGlow 2.2s ease-in-out infinite;
    animation-delay: 0.2s, 0.9s;
  }

  .sub {
    font-size: 50px;
    font-weight: 600;
    color: #f8fafc;
    line-height: 1.35;
    margin-top: 28px;
    max-width: 820px;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.4s;
  }

  .onde {
    color: #06b6d4;
    font-weight: 900;
    text-shadow: 0 0 20px rgba(6,182,212,0.55);
  }

  .extra {
    font-size: 44px;
    font-weight: 500;
    color: #64748b;
    line-height: 1.4;
    margin-top: 18px;
    max-width: 800px;
    animation: fadeIn 0.5s ease both;
    animation-delay: 0.55s;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
    border-radius: 2px;
    margin: 32px auto;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.68s;
  }

  .cta {
    font-size: 44px;
    font-weight: 600;
    color: #94a3b8;
    line-height: 1.4;
    max-width: 780px;
    animation: fadeIn 0.5s ease both;
    animation-delay: 0.78s;
  }

  .cta strong {
    color: #f8fafc;
    font-weight: 800;
  }

  .contact-card {
    margin-top: 28px;
    padding: 28px 48px;
    background: rgba(6,182,212,0.07);
    border: 1px solid rgba(6,182,212,0.22);
    border-radius: 18px;
    font-size: 46px;
    font-weight: 600;
    color: #f8fafc;
    text-align: center;
    line-height: 1.45;
    max-width: 780px;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.88s;
  }

  .contact-card strong {
    color: #06b6d4;
    font-weight: 800;
  }

  /* Sparkles */
  .sparkles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .sparkle {
    position: absolute;
    color: #06b6d4;
    opacity: 0;
    animation: sparkle 2.6s ease-in-out infinite;
  }
  .sparkle:nth-child(1) { top: 18%; left: 12%;  animation-delay: 1.0s; }
  .sparkle:nth-child(2) { top: 14%; right: 14%; animation-delay: 1.6s; }
  .sparkle:nth-child(3) { top: 72%; left: 10%;  animation-delay: 1.3s; }
  .sparkle:nth-child(4) { top: 76%; right: 12%; animation-delay: 2.0s; }
  .sparkle:nth-child(5) { top: 45%; left: 6%;   animation-delay: 2.3s; }
  .sparkle:nth-child(6) { top: 42%; right: 7%;  animation-delay: 1.8s; }

  .handle {
    position: absolute;
    bottom: 64px;
    right: 72px;
    font-size: 32px;
    font-weight: 700;
    color: #94a3b8;
    animation: fadeIn 0.4s ease both;
    animation-delay: 1.0s;
  }
  .handle em { font-style: normal; color: #06b6d4; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes cyanGlow {
    0%, 100% {
      text-shadow:
        0 0 50px rgba(6,182,212,0.6),
        0 0 100px rgba(6,182,212,0.25);
    }
    50% {
      text-shadow:
        0 0 70px rgba(6,182,212,0.9),
        0 0 140px rgba(6,182,212,0.45);
    }
  }
  @keyframes sparkle {
    0%       { opacity: 0; transform: scale(0) rotate(0deg); }
    30%, 65% { opacity: 1; transform: scale(1) rotate(180deg); }
    100%     { opacity: 0; transform: scale(0) rotate(360deg); }
  }
</style>
</head>
<body data-duration="9">
<div class="scene">
  <div class="blob-center"></div>
  <div class="blob-bot"></div>
  <div class="bg-dots"></div>

  <div class="sparkles">
    <div class="sparkle">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <div class="sparkle">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <div class="sparkle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <div class="sparkle">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <div class="sparkle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <div class="sparkle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
  </div>

  <p class="question">Mas vale a pena?</p>
  <p class="answer">Sim.</p>
  <p class="sub">Se você souber <span class="onde">ONDE</span> está entrando!</p>
  <p class="extra">Pesquise, conheça, converse com um mentor.</p>

  <div class="divider"></div>

  <p class="cta">
    <strong>Salve</strong> e mande para alguém<br>que precisa ouvir isso.
  </p>

  <div class="contact-card">
    Quer saber mais?<br>
    <strong>Entre em contato comigo!</strong>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
