<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f172a;
    font-family: 'Manrope', sans-serif;
  }

  .scene {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 100px 90px 100px 110px;
  }

  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(248,250,252,0.05) 1.5px, transparent 1.5px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .blob-top {
    position: absolute;
    top: -60px;
    right: -60px;
    width: 560px;
    height: 560px;
    background: radial-gradient(circle, rgba(168,85,247,0.10) 0%, transparent 65%);
    pointer-events: none;
  }

  .blob-bot {
    position: absolute;
    bottom: -60px;
    left: -60px;
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, rgba(99,102,241,0.09) 0%, transparent 65%);
    pointer-events: none;
  }

  .accent-left {
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    background: linear-gradient(180deg, #a855f7 0%, #6366f1 100%);
  }

  .ghost-num {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 580px;
    font-weight: 900;
    letter-spacing: -0.06em;
    color: rgba(168,85,247,0.04);
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(168,85,247,0.10);
    border: 1px solid rgba(168,85,247,0.28);
    border-radius: 100px;
    padding: 12px 28px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #a855f7;
    margin-bottom: 44px;
    animation: fadeIn 0.35s ease both;
    animation-delay: 0.0s;
  }

  .icon-wrap {
    margin-bottom: 36px;
    color: #a855f7;
    filter: drop-shadow(0 0 18px rgba(168,85,247,0.5));
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.15s;
  }

  h2 {
    font-size: 76px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.08;
    color: #f8fafc;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.3s;
  }

  h2 .accent {
    color: #a855f7;
    text-shadow: 0 0 30px rgba(168,85,247,0.4);
  }

  .divider {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #a855f7, transparent);
    border-radius: 2px;
    margin: 36px 0;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.5s;
  }

  .list {
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 24px;
    opacity: 0;
    animation: fadeUp 0.45s ease both;
  }
  .list-item:nth-child(1) { animation-delay: 0.55s; }
  .list-item:nth-child(2) { animation-delay: 0.7s;  }
  .list-item:nth-child(3) { animation-delay: 0.85s; }
  .list-item:nth-child(4) { animation-delay: 1.0s;  }

  .list-icon {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    background: rgba(168,85,247,0.12);
    border: 1px solid rgba(168,85,247,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a855f7;
    flex-shrink: 0;
    animation: itemPulse 2.8s ease-in-out infinite;
  }
  .list-item:nth-child(1) .list-icon { animation-delay: 1.1s; }
  .list-item:nth-child(2) .list-icon { animation-delay: 1.4s; }
  .list-item:nth-child(3) .list-icon { animation-delay: 1.7s; }
  .list-item:nth-child(4) .list-icon { animation-delay: 2.0s; }

  .list-text {
    font-size: 58px;
    font-weight: 600;
    color: #f8fafc;
    line-height: 1.2;
    overflow: hidden;
    white-space: nowrap;
  }

  .list-sub {
    font-size: 38px;
    font-weight: 500;
    color: #64748b;
    margin-top: 2px;
    overflow: hidden;
    white-space: nowrap;
  }

  /* Typewriter por item — texto digita logo após o item fazer fadeUp */
  /* Títulos: 15, 11, 13, 11 chars · 50ms/ch */
  .list-item:nth-child(1) .list-text { animation: typeReveal 0.75s steps(15, end) 1.00s both; }
  .list-item:nth-child(2) .list-text { animation: typeReveal 0.55s steps(11, end) 1.15s both; }
  .list-item:nth-child(3) .list-text { animation: typeReveal 0.65s steps(13, end) 1.30s both; }
  .list-item:nth-child(4) .list-text { animation: typeReveal 0.55s steps(11, end) 1.45s both; }
  /* Subs: 0.6s por linha */
  .list-item:nth-child(1) .list-sub { animation: typeReveal 0.6s steps(31, end) 1.75s both; }
  .list-item:nth-child(2) .list-sub { animation: typeReveal 0.6s steps(41, end) 1.70s both; }
  .list-item:nth-child(3) .list-sub { animation: typeReveal 0.6s steps(32, end) 1.95s both; }
  .list-item:nth-child(4) .list-sub { animation: typeReveal 0.6s steps(40, end) 2.00s both; }

  @keyframes typeReveal {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0%   0 0); }
  }

  .handle {
    position: absolute;
    bottom: 64px;
    right: 72px;
    font-size: 32px;
    font-weight: 600;
    color: #94a3b8;
    animation: fadeIn 0.4s ease both;
    animation-delay: 1.1s;
  }
  .handle em { font-style: normal; color: #06b6d4; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes itemPulse {
    0%, 100% { background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.25); }
    50%       { background: rgba(168,85,247,0.22); border-color: rgba(168,85,247,0.45); }
  }
</style>
</head>
<body data-duration="13">
<div class="scene">
  <div class="blob-top"></div>
  <div class="blob-bot"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>
  <div class="ghost-num">03</div>

  <div class="tag">Verdade 03</div>

  <div class="icon-wrap">
    <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 18 22 12 16 6"/>
      <polyline points="8 6 2 12 8 18"/>
    </svg>
  </div>

  <h2>Entrevistas mais difíceis<br><span class="accent">que vestibulares.</span></h2>

  <div class="divider"></div>

  <div class="list">
    <div class="list-item">
      <div class="list-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div>
        <div class="list-text">Testes técnicos</div>
        <div class="list-sub">antes mesmo de falar com alguém</div>
      </div>
    </div>

    <div class="list-item">
      <div class="list-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <div>
        <div class="list-text">Live coding</div>
        <div class="list-sub">resolver problema ao vivo, com julgamento</div>
      </div>
    </div>

    <div class="list-item">
      <div class="list-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <circle cx="3" cy="6" r="2"/>
          <circle cx="21" cy="6" r="2"/>
          <circle cx="3" cy="18" r="2"/>
          <circle cx="21" cy="18" r="2"/>
          <line x1="5" y1="6" x2="10" y2="10"/>
          <line x1="19" y1="6" x2="14" y2="10"/>
          <line x1="5" y1="18" x2="10" y2="14"/>
          <line x1="19" y1="18" x2="14" y2="14"/>
        </svg>
      </div>
      <div>
        <div class="list-text">System design</div>
        <div class="list-sub">projetar sistemas do zero na hora</div>
      </div>
    </div>

    <div class="list-item">
      <div class="list-icon">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div>
        <div class="list-text">3–5 rodadas</div>
        <div class="list-sub">semanas de processo para uma vaga júnior</div>
      </div>
    </div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
