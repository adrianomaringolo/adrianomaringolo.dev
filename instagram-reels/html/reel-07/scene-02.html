<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #0f172a;
    font-family: 'Manrope', sans-serif;
  }

  .scene {
    width: 1080px;
    height: 1920px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 100px 90px 100px 110px;
  }

  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(248,250,252,0.05) 1.5px, transparent 1.5px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .blob-top {
    position: absolute;
    top: -60px;
    right: -80px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(249,115,22,0.10) 0%, transparent 65%);
    pointer-events: none;
  }

  .blob-bot {
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(99,102,241,0.09) 0%, transparent 65%);
    pointer-events: none;
  }

  .accent-left {
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    background: linear-gradient(180deg, #f97316 0%, #6366f1 100%);
  }

  .ghost-num {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 580px;
    font-weight: 900;
    letter-spacing: -0.06em;
    color: rgba(249,115,22,0.04);
    line-height: 1;
    user-select: none;
    pointer-events: none;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(249,115,22,0.12);
    border: 1px solid rgba(249,115,22,0.28);
    border-radius: 100px;
    padding: 12px 28px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #f97316;
    margin-bottom: 52px;
    animation: fadeIn 0.35s ease both;
    animation-delay: 0.0s;
  }

  .icon-wrap {
    margin-bottom: 44px;
    color: #f97316;
    filter: drop-shadow(0 0 18px rgba(249,115,22,0.5));
    animation: fadeIn 0.4s ease both, floatUp 1.6s ease-in-out infinite;
    animation-delay: 0.15s, 0.9s;
  }

  h2 {
    font-size: 82px;
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.08;
    color: #f8fafc;
    margin-bottom: 0;
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.3s;
  }

  h2 .accent {
    color: #f97316;
    text-shadow: 0 0 30px rgba(249,115,22,0.4);
  }

  .divider {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, #f97316, transparent);
    border-radius: 2px;
    margin: 44px 0;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.5s;
  }

  .desc {
    font-size: 52px;
    font-weight: 500;
    line-height: 1.5;
    color: #94a3b8;
    max-width: 880px;
  }

  /* Typewriter via CSS clip-path — compatível com o scrubbing do export */
  .dl { overflow: hidden; white-space: nowrap; }
  /* 0.35s por linha */
  .dl-1 { animation: typeReveal 0.35s steps(34, end) 1.10s both; }
  .dl-2 { animation: typeReveal 0.35s steps(21, end) 1.45s both; }
  .dl-3 { animation: typeReveal 0.35s steps(16, end) 1.80s both; }
  .dl-4 { animation: typeReveal 0.35s steps(27, end) 2.15s both; }
  .dl-5 { animation: typeReveal 0.35s steps(33, end) 2.50s both; }

  @keyframes typeReveal {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0%   0 0); }
  }

  .handle {
    position: absolute;
    bottom: 64px;
    right: 72px;
    font-size: 32px;
    font-weight: 600;
    color: #94a3b8;
    animation: fadeIn 0.4s ease both;
    animation-delay: 0.8s;
  }
  .handle em { font-style: normal; color: #06b6d4; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes floatUp {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }
</style>
</head>
<body data-duration="10">
<div class="scene">
  <div class="blob-top"></div>
  <div class="blob-bot"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>
  <div class="ghost-num">01</div>

  <div class="tag">Verdade 01</div>

  <div class="icon-wrap">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
      <polyline points="17 6 23 6 23 12"/>
    </svg>
  </div>

  <h2>A barra de entrada<br>está <span class="accent">subindo.</span></h2>

  <div class="divider"></div>

  <div class="desc">
    <div class="dl dl-1">A IA elevou o piso mínimo exigido.</div>
    <div class="dl dl-2">O que era diferencial</div>
    <div class="dl dl-3">virou obrigação.</div>
    <div class="dl dl-4">Candidatos mais experientes</div>
    <div class="dl dl-5">concorrem às mesmas vagas júnior.</div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
