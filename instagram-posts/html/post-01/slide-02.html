<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #f5f7fa; font-family: 'Manrope', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: #f5f7fa;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 88px 88px 100px;
  }

  .blob-1 {
    position: absolute; top: -250px; right: -250px;
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(8,145,178,0.10) 0%, transparent 70%);
  }
  .blob-2 {
    position: absolute; bottom: -200px; left: -100px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.09) 0%, transparent 70%);
  }
  .bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(15,23,42,0.05) 1.5px, transparent 1.5px);
    background-size: 40px 40px;
  }
  .accent-left {
    position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: linear-gradient(180deg, #0891b2, #6366f1);
  }
  .accent-top {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #0891b2, #6366f1);
  }

  .progress {
    position: absolute; bottom: 44px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px;
  }
  .dot { width: 28px; height: 6px; border-radius: 3px; background: #e2e8f0; }
  .dot.active { background: linear-gradient(90deg, #0891b2, #6366f1); width: 48px; }

  .handle {
    position: absolute; bottom: 44px; right: 72px;
    font-size: 20px; font-weight: 700; color: #94a3b8;
  }
  .handle em { color: #0891b2; font-style: normal; }

  /* Content */
  .content {
    position: relative; z-index: 10;
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; gap: 64px;
  }

  .slide-label {
    display: inline-flex; align-items: center; gap: 10px;
  }
  .label-line {
    width: 40px; height: 3px;
    background: linear-gradient(90deg, #0891b2, #6366f1);
    border-radius: 2px;
  }
  .label-text {
    font-size: 17px; font-weight: 700; color: #0891b2;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .headline {
    font-size: 72px; font-weight: 900;
    line-height: 1.0; letter-spacing: -0.03em;
    color: #0f172a;
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(90deg, #0891b2, #6366f1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .divider {
    width: 80px; height: 4px;
    background: linear-gradient(90deg, #0891b2, #6366f1);
    border-radius: 2px;
  }

  .body-text {
    font-size: 38px; font-weight: 500;
    color: #334155; line-height: 1.55;
  }
  .body-text strong { color: #0f172a; font-weight: 800; }

  .year-badge {
    display: inline-flex; align-items: center; gap: 12px;
    background: #ffffff;
    border: 1.5px solid #e2e8f0;
    border-radius: 16px; padding: 20px 32px;
    box-shadow: 0 4px 24px rgba(15,23,42,0.06);
    align-self: flex-start;
  }
  .year-num {
    font-size: 62px; font-weight: 900; line-height: 1;
    background: linear-gradient(90deg, #0891b2, #6366f1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .year-label {
    font-size: 23px; font-weight: 600; color: #64748b;
    line-height: 1.3;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>
  <div class="accent-top"></div>

  <div class="content">
    <div class="slide-label">
      <div class="label-line"></div>
      <span class="label-text">Minha história</span>
    </div>

    <div class="headline">
      Código como<br><em>ofício.</em>
    </div>

    <div class="divider"></div>

    <p class="body-text">
      Comecei em <strong>2009</strong> desenvolvendo sistemas corporativos em .NET. Desde então, evoluí para um especialista em <strong>frontend moderno</strong>, passando por grandes empresas nacionais e internacionais.
    </p>

    <div class="year-badge">
      <span class="year-num">2009</span>
      <span class="year-label">Início da<br>jornada</span>
    </div>
  </div>

  <div class="progress">
    <div class="dot"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
