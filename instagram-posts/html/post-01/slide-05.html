<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0f172a; font-family: 'Manrope', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: #0f172a;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 88px 88px 100px;
  }

  .blob-1 {
    position: absolute; top: -250px; left: -250px;
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(8,145,178,0.18) 0%, transparent 65%);
  }
  .blob-2 {
    position: absolute; bottom: -200px; right: -200px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.16) 0%, transparent 65%);
  }
  .blob-3 {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(8,145,178,0.06) 0%, transparent 70%);
  }
  .bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1.5px, transparent 1.5px);
    background-size: 44px 44px;
  }
  .accent-left {
    position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: linear-gradient(180deg, #06b6d4, #6366f1);
  }
  .accent-top {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
  }

  .progress {
    position: absolute; bottom: 44px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px;
  }
  .dot { width: 28px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.12); }
  .dot.active { background: linear-gradient(90deg, #06b6d4, #6366f1); width: 48px; }

  .handle {
    position: absolute; bottom: 44px; right: 72px;
    font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.25);
  }
  .handle em { color: #06b6d4; font-style: normal; }

  /* Content */
  .content {
    position: relative; z-index: 10;
    flex: 1; display: flex; flex-direction: column;
    justify-content: space-between;
  }

  .top {
    display: flex; flex-direction: column; gap: 32px;
  }

  .slide-label {
    display: inline-flex; align-items: center; gap: 10px;
  }
  .label-line { width: 40px; height: 3px; background: linear-gradient(90deg, #06b6d4, #6366f1); border-radius: 2px; }
  .label-text { font-size: 17px; font-weight: 700; color: #06b6d4; letter-spacing: 0.1em; text-transform: uppercase; }

  .headline {
    font-size: 72px; font-weight: 900;
    line-height: 0.95; letter-spacing: -0.03em;
    color: #fafafa;
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(90deg, #06b6d4, #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  /* Stats grid */
  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }

  .stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px; padding: 40px 36px;
    position: relative; overflow: hidden;
  }
  .stat::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
  }
  .stat-num {
    font-size: 72px; font-weight: 900; line-height: 1;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #06b6d4 0%, #818cf8 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 24px; font-weight: 600; color: #52525b;
    text-transform: uppercase; letter-spacing: 0.04em;
  }

  /* Site card */
  .site-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 36px 40px;
    position: relative; overflow: hidden;
  }
  .site-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(6,182,212,0.08) 0%, rgba(99,102,241,0.08) 100%);
    pointer-events: none;
  }
  .site-card-top {
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
  }
  .browser-dot {
    width: 12px; height: 12px; border-radius: 50%;
  }
  .site-card-label {
    font-size: 16px; font-weight: 700; color: #52525b;
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-left: 6px;
  }
  .site-url {
    font-size: 52px; font-weight: 900; line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #06b6d4 0%, #818cf8 60%, #06b6d4 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 20px;
  }
  .site-card-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .site-cta-text {
    font-size: 22px; font-weight: 600; color: #71717a;
  }
  .site-arrow {
    display: flex; align-items: center; justify-content: center;
    width: 48px; height: 48px; border-radius: 12px;
    background: linear-gradient(135deg, #06b6d4, #6366f1);
    color: white; flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="blob-3"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>
  <div class="accent-top"></div>

  <div class="content">
    <div class="top">
      <div class="slide-label">
        <div class="label-line"></div>
        <span class="label-text">Números</span>
      </div>

      <div class="headline">
        Resultados<br>que <em>falam.</em>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">17+</div>
        <div class="stat-label">Anos de exp.</div>
      </div>
      <div class="stat">
        <div class="stat-num">50+</div>
        <div class="stat-label">Projetos</div>
      </div>
      <div class="stat">
        <div class="stat-num">160+</div>
        <div class="stat-label">Mentorados</div>
      </div>
      <div class="stat">
        <div class="stat-num">100%</div>
        <div class="stat-label">Satisfação</div>
      </div>
    </div>

    <div class="site-card">
      <div class="site-card-top">
        <div class="browser-dot" style="background:#ef4444;"></div>
        <div class="browser-dot" style="background:#f59e0b;"></div>
        <div class="browser-dot" style="background:#22c55e;"></div>
        <span class="site-card-label">Conheça meu trabalho</span>
      </div>
      <div class="site-url">adrianomaringolo.dev</div>
      <div class="site-card-footer">
        <span class="site-cta-text">Vamos conversar?</span>
        <div class="site-arrow">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div class="progress">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
