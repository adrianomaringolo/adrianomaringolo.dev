<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0f172a; font-family: 'Manrope', sans-serif; }
  .slide { width: 1080px; height: 1350px; background: #0f172a; position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 80px 88px 100px; }
  .blob-1 { position: absolute; top: -250px; right: -250px; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%); }
  .blob-2 { position: absolute; bottom: -250px; left: -250px; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 70%); }
  .bg-dots { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(248,250,252,0.04) 1.5px, transparent 1.5px); background-size: 40px 40px; }
  .accent-left { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, #06b6d4, #6366f1, #06b6d4); }
  .accent-top { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #06b6d4, #6366f1); }
  .progress { position: absolute; bottom: 42px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; }
  .dot { width: 28px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.12); }
  .dot.active { background: linear-gradient(90deg, #06b6d4, #6366f1); width: 48px; }
  .handle { position: absolute; bottom: 42px; right: 72px; font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.30); }
  .handle em { color: #06b6d4; font-style: normal; }
  .content { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 48px; }
  .label { display: inline-flex; align-items: center; gap: 10px; width: fit-content; background: rgba(6,182,212,0.10); border: 1.5px solid rgba(6,182,212,0.25); border-radius: 100px; padding: 10px 22px; }
  .label-dot { width: 8px; height: 8px; background: #06b6d4; border-radius: 50%; }
  .label-text { font-size: 15px; font-weight: 700; color: #06b6d4; letter-spacing: 0.1em; text-transform: uppercase; }
  .headline { font-size: 86px; font-weight: 900; color: #f1f5f9; line-height: 1.0; letter-spacing: -0.03em; }
  .headline em { font-style: normal; background: linear-gradient(90deg, #06b6d4 0%, #6366f1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .sub { font-size: 32px; font-weight: 500; color: #64748b; line-height: 1.5; }
  .cta-box { background: rgba(6,182,212,0.08); border: 1.5px solid rgba(6,182,212,0.22); border-radius: 22px; padding: 36px 42px; display: flex; flex-direction: column; gap: 10px; }
  .cta-label { font-size: 16px; font-weight: 700; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; }
  .cta-url { font-size: 50px; font-weight: 900; letter-spacing: -0.02em; background: linear-gradient(90deg, #06b6d4, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
</style>
</head>
<body>
<div class="slide">
  <div class="blob-1"></div><div class="blob-2"></div><div class="bg-dots"></div>
  <div class="accent-left"></div><div class="accent-top"></div>
  <div class="content">
    <div class="label"><div class="label-dot"></div><span class="label-text">Vamos conversar?</span></div>
    <div class="headline">Posso construir<br>o seu <em>site.</em></div>
    <div class="sub">Desenvolvimento sob medida para prestadores de serviço que querem atrair mais clientes.</div>
    <div class="cta-box">
      <div class="cta-label">me encontra aqui</div>
      <div class="cta-url">adrianomaringolo.dev</div>
    </div>
  </div>
  <div class="progress">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div>
  </div>
  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
