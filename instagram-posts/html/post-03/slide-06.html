<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #f5f7fa; font-family: 'Manrope', sans-serif; }
  .slide { width: 1080px; height: 1350px; background: #f5f7fa; position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 72px 88px 90px; }
  .blob-1 { position: absolute; top: -180px; right: -180px; width: 650px; height: 650px; border-radius: 50%; background: radial-gradient(circle, rgba(8,145,178,0.10) 0%, transparent 70%); }
  .blob-2 { position: absolute; bottom: -180px; left: -180px; width: 650px; height: 650px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%); }
  .bg-dots { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(15,23,42,0.05) 1.5px, transparent 1.5px); background-size: 40px 40px; }
  .bg-num { position: absolute; top: 10px; right: -55px; font-size: 460px; font-weight: 900; letter-spacing: -0.06em; line-height: 1; background: linear-gradient(135deg, rgba(8,145,178,0.08) 0%, rgba(99,102,241,0.05) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; user-select: none; pointer-events: none; }
  .accent-left { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, #0891b2, #6366f1); }
  .accent-top { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #0891b2, #6366f1); }
  .progress { position: absolute; bottom: 36px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; }
  .dot { width: 28px; height: 6px; border-radius: 3px; background: #e2e8f0; }
  .dot.active { background: linear-gradient(90deg, #0891b2, #6366f1); width: 48px; }
  .handle { position: absolute; bottom: 36px; right: 72px; font-size: 20px; font-weight: 700; color: #94a3b8; }
  .handle em { color: #0891b2; font-style: normal; }
  .content { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 44px; }
  .counter { display: flex; align-items: center; gap: 14px; }
  .counter-line { width: 40px; height: 3px; background: linear-gradient(90deg, #0891b2, #6366f1); border-radius: 2px; }
  .counter-text { font-size: 16px; font-weight: 700; color: #94a3b8; letter-spacing: 0.1em; text-transform: uppercase; }
  .counter-num { color: #0891b2; }
  .icon-wrap { width: 76px; height: 76px; border-radius: 20px; display: flex; align-items: center; justify-content: center; background: rgba(8,145,178,0.10); color: #0891b2; }
  .title { font-size: 64px; font-weight: 900; color: #0f172a; line-height: 1.1; letter-spacing: -0.025em; }
  .title em { font-style: normal; background: linear-gradient(90deg, #0891b2, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .body { font-size: 34px; font-weight: 500; color: #475569; line-height: 1.55; }
  .highlight { background: #fff; border: 1.5px solid #e2e8f0; border-left: 4px solid #0891b2; border-radius: 16px; padding: 22px 28px; font-size: 27px; font-weight: 700; color: #0f172a; line-height: 1.4; }
</style>
</head>
<body>
<div class="slide">
  <div class="blob-1"></div><div class="blob-2"></div><div class="bg-dots"></div>
  <div class="bg-num">05</div>
  <div class="accent-left"></div><div class="accent-top"></div>
  <div class="content">
    <div class="counter">
      <div class="counter-line"></div>
      <span class="counter-text">RAZÃO <span class="counter-num">05</span> / 05</span>
    </div>
    <div class="icon-wrap">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
      </svg>
    </div>
    <div class="title">Você controla<br>como é <em>percebido.</em></div>
    <div class="body">Com um site próprio, você define sua identidade, seus diferenciais e o tipo de cliente que quer atrair — sem depender do alcance de rede social nenhuma.</div>
    <div class="highlight">Sua vitrine profissional, do seu jeito.</div>
  </div>
  <div class="progress">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div>
  </div>
  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
