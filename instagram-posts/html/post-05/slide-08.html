<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0f172a; font-family: 'Manrope', sans-serif; }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px 80px 100px;
  }

  .blob-1 {
    position: absolute;
    width: 700px;
    height: 700px;
    top: -120px;
    right: -150px;
    background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .blob-2 {
    position: absolute;
    width: 600px;
    height: 600px;
    bottom: -100px;
    left: -100px;
    background: radial-gradient(circle, rgba(99,102,241,0.13) 0%, transparent 70%);
    pointer-events: none;
  }

  .bg-dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1.5px, transparent 1.5px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .accent-left {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: linear-gradient(180deg, #06b6d4, #6366f1);
  }

  .accent-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
  }

  .eyebrow {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #06b6d4;
    margin-bottom: 28px;
  }

  .statement {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.0;
    letter-spacing: -0.03em;
    color: #f1f5f9;
    margin-bottom: 36px;
  }

  .statement em {
    font-style: normal;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 30px;
    font-weight: 500;
    line-height: 1.55;
    color: #94a3b8;
    margin-bottom: 64px;
    max-width: 800px;
  }

  .cta-block {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    margin-bottom: 60px;
  }

  .cta-item {
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 24px 28px;
  }

  .cta-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(6,182,212,0.15);
    flex-shrink: 0;
  }

  .cta-text {
    font-size: 24px;
    font-weight: 600;
    color: #e2e8f0;
  }

  .handle-big {
    font-size: 36px;
    font-weight: 900;
    color: #475569;
    letter-spacing: -0.01em;
  }

  .handle-big em {
    font-style: normal;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .progress {
    position: absolute;
    bottom: 52px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .dot {
    width: 28px;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
  }

  .dot.active {
    width: 48px;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
  }

  .handle {
    position: absolute;
    bottom: 48px;
    right: 72px;
    font-size: 18px;
    font-weight: 700;
    color: #475569;
    letter-spacing: 0.01em;
  }

  .handle em {
    font-style: normal;
    color: #06b6d4;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>
  <div class="accent-top"></div>

  <div class="eyebrow">Conclusão</div>

  <h2 class="statement">Você já<br>usa IA gen.<br>A questão é:<br>usa <em>bem</em>?</h2>

  <p class="subtitle">Entender o que está por baixo faz toda a diferença — para usar com mais intenção e menos ilusão.</p>

  <div class="cta-block">
    <div class="cta-item">
      <div class="cta-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </div>
      <div class="cta-text">Salve para revisar depois</div>
    </div>

    <div class="cta-item">
      <div class="cta-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="cta-text">Qual ferramenta de IA gen você mais usa?</div>
    </div>
  </div>

  <div class="handle-big"><em>@adrianomaringolo</em>.dev</div>

  <div class="progress">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
