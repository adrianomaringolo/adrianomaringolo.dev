<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #0f172a; font-family: 'Manrope', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: #0f172a;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 80px;
  }

  .blob-1 {
    position: absolute; top: -120px; left: -120px;
    width: 640px; height: 640px;
    background: radial-gradient(circle, rgba(6,182,212,0.14) 0%, transparent 65%);
  }
  .blob-2 {
    position: absolute; bottom: -120px; right: -120px;
    width: 640px; height: 640px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 65%);
  }
  .bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(248,250,252,0.055) 1.5px, transparent 1.5px);
    background-size: 40px 40px;
  }
  .accent-left {
    position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: linear-gradient(180deg, #06b6d4, #6366f1);
  }
  .accent-top {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
  }

  .progress {
    position: absolute; bottom: 44px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px;
  }
  .dot { width: 28px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.12); }
  .dot.active { background: linear-gradient(90deg, #06b6d4, #6366f1); width: 48px; }

  .handle {
    position: absolute; bottom: 44px; right: 72px;
    font-size: 20px; font-weight: 700; color: #475569;
  }
  .handle em { color: #06b6d4; font-style: normal; }

  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 40px;
  }

  .icon-wrap {
    width: 120px; height: 120px;
    background: rgba(6,182,212,0.10);
    border: 1.5px solid rgba(6,182,212,0.25);
    border-radius: 32px;
    display: flex; align-items: center; justify-content: center;
    color: #06b6d4;
  }

  .tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(6,182,212,0.10);
    border: 1.5px solid rgba(6,182,212,0.25);
    border-radius: 100px; padding: 10px 28px;
  }
  .tag-dot { width: 8px; height: 8px; background: #06b6d4; border-radius: 50%; }
  .tag-text { font-size: 17px; font-weight: 700; color: #06b6d4; letter-spacing: 0.1em; text-transform: uppercase; }

  .headline {
    font-size: 104px; font-weight: 900;
    letter-spacing: -0.04em; line-height: 1.0;
    color: #f8fafc;
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(90deg, #06b6d4, #6366f1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .subtitle {
    font-size: 34px; font-weight: 500;
    color: #64748b; line-height: 1.5;
    max-width: 760px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>
  <div class="accent-top"></div>

  <div class="content">
    <div class="tag">
      <div class="tag-dot"></div>
      <span class="tag-text">Desmistificando IA</span>
    </div>

    <div class="icon-wrap">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v1a3 3 0 0 1-3 3h-1v1a4 4 0 0 1-8 0v-1H7a3 3 0 0 1-3-3v-1a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/>
        <circle cx="9" cy="10" r="1" fill="currentColor" stroke="none"/>
        <circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"/>
        <path d="M9 14s1 1 3 1 3-1 3-1"/>
      </svg>
    </div>

    <div class="headline">IA para<br><em>humanos.</em></div>

    <p class="subtitle">LLMs, agentes e usos práticos —<br>em linguagem que qualquer pessoa entende</p>
  </div>

  <div class="progress">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
