<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #080f1e; font-family: 'Manrope', sans-serif; }

  .slide { width: 1080px; height: 1350px; position: relative; overflow: hidden; }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-color: #080f1e;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.09) 1px, transparent 1px);
    background-size: 54px 54px;
  }

  /* Radial vignette to soften grid edges */
  .bg-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, transparent 40%, rgba(8, 15, 30, 0.6) 100%);
  }

  .accent-left { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, #06b6d4, #6366f1); z-index: 20; }
  .accent-top  { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #06b6d4, #6366f1); z-index: 20; }

  .content {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 88px 80px 0 88px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .eyebrow { font-size: 22px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: #475569; }

  .headline { font-size: 102px; font-weight: 900; line-height: 1.0; letter-spacing: -0.03em; color: #f1f5f9; }
  .headline-kicker { display: block; font-size: 48px; font-weight: 700; letter-spacing: -0.01em; color: #06b6d4; margin-bottom: 10px; }
  .headline-gradient { background: linear-gradient(90deg, #06b6d4, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .subtitle { font-size: 36px; font-weight: 500; color: #cbd5e1; line-height: 1.5; max-width: 820px; }

  .arrow { margin-top: 12px; color: #ffffff; opacity: 0.7; }

  /* Preview frame */
  .preview-wrap {
    position: absolute;
    bottom: 108px;
    left: 72px;
    right: 72px;
    z-index: 15;
  }

  /* Glow behind the frame */
  .preview-glow {
    position: absolute;
    inset: -24px;
    border-radius: 24px;
    background: radial-gradient(ellipse at 50% 60%, rgba(6, 182, 212, 0.18) 0%, rgba(99, 102, 241, 0.10) 50%, transparent 80%);
    filter: blur(16px);
    z-index: -1;
  }

  .preview-frame {
    border-radius: 12px;
    border: 1px solid rgba(6, 182, 212, 0.30);
    box-shadow:
      0 0 0 1px rgba(99, 102, 241, 0.12),
      0 28px 80px rgba(0, 0, 0, 0.65);
    overflow: hidden;
    background: #0d1b36;
  }

  .preview-topbar {
    height: 34px;
    background: #111d38;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 7px;
  }

  .dot-r { width: 12px; height: 12px; border-radius: 50%; background: #ef4444; opacity: 0.75; }
  .dot-y { width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; opacity: 0.75; }
  .dot-g { width: 12px; height: 12px; border-radius: 50%; background: #22c55e; opacity: 0.75; }

  .preview-img {
    display: block;
    width: 100%;
    height: 470px;
    object-fit: cover;
    object-position: top center;
  }

  .progress { position: absolute; bottom: 52px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; z-index: 30; }
  .dot { width: 28px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.18); }
  .dot.active { width: 48px; background: linear-gradient(90deg, #06b6d4, #6366f1); }

  .handle { position: absolute; bottom: 44px; right: 72px; font-size: 27px; font-weight: 700; color: #f1f5f9; z-index: 30; }
  .handle em { font-style: normal; color: #06b6d4; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>
  <div class="accent-left"></div>
  <div class="accent-top"></div>

  <div class="content">
    <div class="eyebrow">Case · Estética & Bem-Estar</div>

    <h1 class="headline">
      <span class="headline-kicker">GoLaser</span>
      Barão<br><span class="headline-gradient">Geraldo</span>
    </h1>

    <p class="subtitle">Site profissional para clínica de estética —<br>design, performance e conversão.</p>

    <div class="arrow">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </div>
  </div>

  <div class="preview-wrap">
    <div class="preview-glow"></div>
    <div class="preview-frame">
      <div class="preview-topbar">
        <div class="dot-r"></div>
        <div class="dot-y"></div>
        <div class="dot-g"></div>
      </div>
      <img class="preview-img"
           src="../../../public/projects/golaser-barao-geraldo/01-hero.png"
           alt="GoLaser Barão Geraldo — site preview">
    </div>
  </div>

  <div class="progress">
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
