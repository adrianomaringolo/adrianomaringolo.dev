<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #080f1e; font-family: 'Manrope', sans-serif; }
  .slide { width: 1080px; height: 1350px; position: relative; overflow: hidden; }

  .bg-grid {
    position: absolute; inset: 0;
    background-color: #080f1e;
    background-image:
      linear-gradient(rgba(99, 102, 241, 0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99, 102, 241, 0.09) 1px, transparent 1px);
    background-size: 54px 54px;
  }
  .bg-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, transparent 40%, rgba(8, 15, 30, 0.6) 100%);
  }

  .accent-left { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: linear-gradient(180deg, #06b6d4, #6366f1); z-index: 20; }
  .accent-top  { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #06b6d4, #6366f1); z-index: 20; }

  .content {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    padding: 80px 80px 0 88px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .brand-row { display: flex; align-items: center; gap: 24px; }
  .brand-logo { width: 80px; height: 80px; border-radius: 18px; box-shadow: 0 0 0 1px rgba(6,182,212,0.25), 0 8px 32px rgba(0,0,0,0.4); }
  .eyebrow { font-size: 20px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: #475569; }

  .headline { font-size: 104px; font-weight: 900; line-height: 1.0; letter-spacing: -0.03em; color: #f1f5f9; }
  .headline-ui { background: linear-gradient(90deg, #06b6d4, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { font-size: 33px; font-weight: 500; color: #cbd5e1; line-height: 1.5; max-width: 820px; }

  .preview-wrap {
    position: absolute; bottom: 108px; left: 72px; right: 72px; z-index: 15;
  }
  .preview-glow {
    position: absolute; inset: -24px; border-radius: 24px;
    background: radial-gradient(ellipse at 50% 60%, rgba(6, 182, 212, 0.18) 0%, rgba(99, 102, 241, 0.10) 50%, transparent 80%);
    filter: blur(16px); z-index: -1;
  }
  .preview-frame {
    border-radius: 12px; border: 1px solid rgba(6, 182, 212, 0.30);
    box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.12), 0 28px 80px rgba(0, 0, 0, 0.65);
    overflow: hidden; background: #ffffff;
  }
  .preview-topbar {
    height: 34px; background: #f1f5f9; border-bottom: 1px solid #e2e8f0;
    display: flex; align-items: center; padding: 0 14px; gap: 7px;
  }
  .dot-r { width: 12px; height: 12px; border-radius: 50%; background: #ef4444; opacity: 0.75; }
  .dot-y { width: 12px; height: 12px; border-radius: 50%; background: #f59e0b; opacity: 0.75; }
  .dot-g { width: 12px; height: 12px; border-radius: 50%; background: #22c55e; opacity: 0.75; }
  .url-bar {
    margin-left: 8px; flex: 1; max-width: 380px; height: 20px;
    background: #fff; border: 1px solid #e2e8f0; border-radius: 4px;
    display: flex; align-items: center; padding: 0 10px;
    font-size: 11px; font-weight: 600; color: #64748b; font-family: 'Manrope', sans-serif;
  }
  .preview-img {
    display: block; width: 100%; height: 460px;
    object-fit: cover; object-position: top center;
  }

  .progress { position: absolute; bottom: 52px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; z-index: 30; }
  .dot { width: 28px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.18); }
  .dot.active { width: 48px; background: linear-gradient(90deg, #06b6d4, #6366f1); }

  .handle { position: absolute; bottom: 44px; right: 72px; font-size: 24px; font-weight: 700; color: rgba(255,255,255,0.35); z-index: 30; }
  .handle em { font-style: normal; color: #06b6d4; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>
  <div class="accent-left"></div>
  <div class="accent-top"></div>

  <div class="content">
    <div class="brand-row">
      <img class="brand-logo"
           src="file:///home/adriano/Projects/personal/adrianomaringolo.dev/public/projects/buildgrid-ui/logo-buildgrid-ui.png"
           alt="BuildGrid UI logo">
      <div class="eyebrow">Open Source · React UI Library</div>
    </div>
    <h1 class="headline">
      Build<span class="headline-ui">Grid</span><br>UI
    </h1>
    <p class="subtitle">54 componentes prontos para<br>React 19 com TypeScript.</p>
  </div>

  <div class="preview-wrap">
    <div class="preview-glow"></div>
    <div class="preview-frame">
      <div class="preview-topbar">
        <div class="dot-r"></div>
        <div class="dot-y"></div>
        <div class="dot-g"></div>
        <div class="url-bar">adrianomaringolo.github.io/buildgrid-ui</div>
      </div>
      <img class="preview-img"
           src="file:///home/adriano/Projects/personal/adrianomaringolo.dev/public/projects/buildgrid-ui/buildgridui-landing.jpeg"
           alt="BuildGrid UI — documentação">
    </div>
  </div>

  <div class="progress">
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
