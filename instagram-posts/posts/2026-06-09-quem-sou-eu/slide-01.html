<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1350px; overflow: hidden; background: #f5f7fa; font-family: 'Manrope', sans-serif; }

  .slide {
    width: 1080px; height: 1350px;
    background: #f5f7fa;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* Background blobs */
  .blob-1 {
    position: absolute; top: -200px; right: -200px;
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(8,145,178,0.12) 0%, transparent 70%);
  }
  .blob-2 {
    position: absolute; bottom: -200px; left: -200px;
    width: 700px; height: 700px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 70%);
  }
  .bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(15,23,42,0.06) 1.5px, transparent 1.5px);
    background-size: 40px 40px;
  }

  /* Accent lines */
  .accent-left {
    position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: linear-gradient(180deg, #0891b2, #6366f1);
  }
  .accent-top {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #0891b2, #6366f1);
  }

  /* Progress dots */
  .progress {
    position: absolute; bottom: 52px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 10px;
  }
  .dot { width: 28px; height: 6px; border-radius: 3px; background: #e2e8f0; }
  .dot.active { background: linear-gradient(90deg, #0891b2, #6366f1); width: 48px; }

  /* Content */
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    padding: 0 80px;
    gap: 0;
  }

  .tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(8,145,178,0.08);
    border: 1.5px solid rgba(8,145,178,0.25);
    border-radius: 100px; padding: 8px 22px;
    margin-bottom: 56px;
  }
  .tag-dot { width: 8px; height: 8px; background: #0891b2; border-radius: 50%; }
  .tag-text { font-size: 17px; font-weight: 700; color: #0891b2; letter-spacing: 0.1em; text-transform: uppercase; }

  .avatar-ring {
    width: 220px; height: 220px; border-radius: 50%; padding: 4px;
    background: linear-gradient(140deg, #0891b2, #6366f1);
    margin-bottom: 52px; position: relative;
  }
  .avatar {
    width: 212px; height: 212px; border-radius: 50%;
    object-fit: cover; object-position: top center;
    border: 5px solid #f5f7fa; display: block;
  }
  .status {
    position: absolute; bottom: 12px; right: 12px;
    width: 28px; height: 28px; background: #22c55e;
    border-radius: 50%; border: 4px solid #f5f7fa;
  }

  .greeting {
    font-size: 30px; font-weight: 600; color: #64748b;
    letter-spacing: 0.04em; text-transform: uppercase;
    margin-bottom: 16px;
  }

  .name {
    font-size: 80px; font-weight: 900;
    line-height: 0.95; letter-spacing: -0.03em;
    color: #0f172a; margin-bottom: 28px;
  }
  .name-gradient {
    background: linear-gradient(90deg, #0891b2, #6366f1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .title {
    font-size: 34px; font-weight: 600; color: #475569;
    letter-spacing: -0.01em; margin-bottom: 0;
  }
  .title strong { color: #0f172a; font-weight: 800; }

  /* Bottom handle */
  .handle {
    position: absolute; bottom: 52px; right: 72px;
    font-size: 20px; font-weight: 700; color: #94a3b8;
  }
  .handle em { color: #0891b2; font-style: normal; }
</style>
</head>
<body>
<div class="slide">
  <div class="blob-1"></div>
  <div class="blob-2"></div>
  <div class="bg-dots"></div>
  <div class="accent-left"></div>
  <div class="accent-top"></div>

  <div class="content">
    <div class="tag">
      <div class="tag-dot"></div>
      <span class="tag-text">Quem sou eu</span>
    </div>

    <div class="avatar-ring">
      <img class="avatar"
        src="file:///home/adriano/Projects/personal/adrianomaringolo.dev/public/images/profile-photo.jpg"
        alt="Adriano Maringolo" />
      <div class="status"></div>
    </div>

    <div class="greeting">Olá, eu sou</div>
    <div class="name">
      Adriano<br>
      <span class="name-gradient">Maringolo</span>
    </div>
    <div class="title"><strong>Senior Software Engineer</strong><br>& Criador de Experiências Digitais</div>
  </div>

  <div class="progress">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="handle"><em>@</em>adrianomaringolo.dev</div>
</div>
</body>
</html>
